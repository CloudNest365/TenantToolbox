name: "✨ Feature Request"
description: Idea for a new cmdlet, a report, or an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "As an admin I want ... so that ..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What could the cmdlet / report look like?
      placeholder: "A new cmdlet Export-M365GuestReport that ..."
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - New report cmdlet
        - New action cmdlet
        - Improvement to an existing cmdlet
        - Engine / infrastructure
        - Documentation
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives / context
